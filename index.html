<script>
// ============= TTS 데이터 =============
const ttsContents = {
  ga: {

  },

// ============= TTS 관련 변수 =============
let currentSpeech = null;
let voicesLoaded = false;
let availableVoices = [];
let speechQueue = [];
let isSpeaking = false;

// 음성 목록 로드
function loadVoices() {
  return new Promise((resolve) => {
    availableVoices = speechSynthesis.getVoices();
    if (availableVoices.length > 0) {
      voicesLoaded = true;
      console.log('✅ 음성 목록 로드됨:', availableVoices.length + '개');
      console.log('사용 가능한 한국어 음성:', availableVoices.filter(v => v.lang.includes('ko')).map(v => v.name));
      resolve();
    } else {
      setTimeout(() => {
        availableVoices = speechSynthesis.getVoices();
        voicesLoaded = availableVoices.length > 0;
        console.log(voicesLoaded ? '✅ 음성 목록 로드됨 (지연)' : '⚠️ 음성 목록 로드 실패');
        resolve();
      }, 100);
    }
  });
}

speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

// 텍스트를 짧은 청크로 분할 (안드로이드 synthesis-failed 해결)
function splitTextIntoChunks(text, maxLength = 100) {
  const sentences = text.split(/([.!?。]+)/).filter(s => s.trim());
  const chunks = [];
  let current = '';

  for (let i = 0; i < sentences.length; i++) {
    const sentence = sentences[i];
    if (current.length + sentence.length <= maxLength) {
      current += sentence;
    } else {
      if (current) chunks.push(current.trim());
      current = sentence;
    }
  }
  if (current) chunks.push(current.trim());

  // 청크가 없으면 강제로 분할
  if (chunks.length === 0 && text.length > 0) {
    for (let i = 0; i < text.length; i += maxLength) {
      chunks.push(text.substring(i, i + maxLength));
    }
  }

  return chunks;
}

// 청크 재생 함수
function speakChunk(chunk, index, total) {
  return new Promise((resolve, reject) => {
    const utterance = new SpeechSynthesisUtterance(chunk);
    utterance.lang = 'ko-KR';
    utterance.rate = 0.9;
    utterance.pitch = 1.0;
    utterance.volume = 1.0;

    // 한국어 음성 찾기
    const koreanVoice = availableVoices.find(v => v.lang.includes('ko'));
    if (koreanVoice) {
      utterance.voice = koreanVoice;
      console.log('🎤 사용 음성:', koreanVoice.name);
    }

    utterance.onstart = () => {
      console.log(`📢 청크 ${index + 1}/${total} 재생 시작:`, chunk.substring(0, 30) + '...');
    };

    utterance.onend = () => {
      console.log(`✅ 청크 ${index + 1}/${total} 재생 완료`);
      resolve();
    };

    utterance.onerror = (event) => {
      console.error(`❌ 청크 ${index + 1}/${total} 오류:`, event.error);
      reject(event.error);
    };

    // 안드로이드 버그 우회
    speechSynthesis.cancel();
    setTimeout(() => {
      speechSynthesis.resume();
      speechSynthesis.speak(utterance);
    }, 50);
  });
}

// TTS 읽기 함수 (청크 방식)
async function readQuestion(level, questionNum) {
  console.log('🔊 TTS 명령 실행됨:', level, questionNum);

  // Web Speech API 지원 확인
  if (!('speechSynthesis' in window)) {
    alert('음성 읽기 기능을 지원하지 않는 브라우저입니다.');
    return;
  }

  // 이미 재생 중이면 중지
  if (isSpeaking) {
    console.log('⏹️ 재생 중지');
    speechSynthesis.cancel();
    isSpeaking = false;
    return;
  }

  // 음성 목록 대기
  if (!voicesLoaded) {
    console.log('⏳ 음성 목록 로딩 중...');
    await loadVoices();
    await new Promise(resolve => setTimeout(resolve, 300));
  }

  const text = ttsContents[level][questionNum];
  if (!text) {
    console.error('❌ 텍스트 없음:', level, questionNum);
    return;
  }

  console.log('📝 원본 텍스트:', text);

  // 텍스트를 짧은 청크로 분할
  const chunks = splitTextIntoChunks(text, 80);
  console.log('✂️ 청크 분할:', chunks.length + '개', chunks);

  isSpeaking = true;

  try {
    // 각 청크를 순차적으로 재생
    for (let i = 0; i < chunks.length; i++) {
      await speakChunk(chunks[i], i, chunks.length);
      // 청크 사이에 짧은 지연
      if (i < chunks.length - 1) {
        await new Promise(resolve => setTimeout(resolve, 200));
      }
    }
    console.log('✅ 전체 재생 완료');
  } catch (error) {
    console.error('❌ 재생 실패:', error);
    alert('음성 재생 오류: ' + error + '\n\n콘솔을 확인하세요.');
  } finally {
    isSpeaking = false;
  }
}

function stopCurrentSpeech() {
  if (isSpeaking) {
    speechSynthesis.cancel();
    isSpeaking = false;
    console.log('⏹️ TTS 중지됨');
  }
}

      <div class="blank-canvas-wrap" style="position:relative">
        ${hintHTML}
        <canvas class="blank-canvas write-canvas" id="${id}" style="width:220px; height:60px;"></canvas>
      </div>
      <span>${after}</span>
      <button class="btn btn-primary" style="margin-left:10px; padding:8px 16px;" onclick="clearCanvas('${id}')">지우기</button>
    </div>
  `;
}

function checkPhoto(el, level, qNum, correctAnswer) {
  const userAnswer = el.getAttribute('data-answer');
  if (userAnswer === correctAnswer) {
    el.classList.add('selected');
    el.classList.remove('wrong');
  } else {
    el.classList.add('wrong');
    el.classList.remove('selected');
  }
}

function clearCanvas(id) {
  const canvas = document.getElementById(id);
  if (canvas) {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
}

// ============= 상태 =============
let currentSea = null;
let currentStep = 1;

// ============= 화면 전환 =============
function showScreen(id) {
  stopCurrentSpeech();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function selectSea(seaId) {
  currentSea = seaId;
  showScreen('levelScreen');
}

function startLesson(level) {
  currentStep = 1;
  renderLesson(level);
  showScreen('lessonScreen');
}

function renderLesson(level) {
  const data = seaData[currentSea][level]['step' + currentStep];
  document.getElementById('lessonContent').innerHTML = `
    <h2 style="color:#1e40af; margin-bottom:20px;">${data.title}</h2>
    ${data.content}
  `;

  document.querySelectorAll('.step-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i + 1 === currentStep);
  });

  document.querySelectorAll('.write-canvas').forEach(canvas => {
    const ctx = canvas.getContext('2d');
    canvas.width = 220;
    canvas.height = 60;
    let drawing = false;

    canvas.addEventListener('mousedown', () => { drawing = true; });
    canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
    canvas.addEventListener('mousemove', (e) => {
      if (!drawing) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.strokeStyle = '#1e40af';
      ctx.lineTo(x, y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x, y);
    });

    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); drawing = true; });
    canvas.addEventListener('touchend', () => { drawing = false; ctx.beginPath(); });
    canvas.addEventListener('touchmove', (e) => {
      if (!drawing) return;
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches[0];
      const x = touch.clientX - rect.left;
      const y = touch.clientY - rect.top;
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.strokeStyle = '#1e40af';
      ctx.lineTo(x, y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x, y);
    });
  });
}

function nextStep() {
  if (currentStep < 3) {
    currentStep++;
    renderLesson('ga');
  } else {
    alert('학습을 완료했습니다! 🎉');
    showScreen('homeScreen');
  }
}

function prevStep() {
  if (currentStep > 1) {
    currentStep--;
    renderLesson('ga');
  } else {
    showScreen('levelScreen');
  }
}
</script>

</body>
